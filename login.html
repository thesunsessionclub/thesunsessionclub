<!DOCTYPE html>
<html lang="es-MX">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso | The Sun Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
<link href="assets/css/site.css?v=20260329-01" rel="stylesheet">
<style>
:root{color-scheme:dark}
body{font-family:'Montserrat',sans-serif;background:#030b08;color:#fff;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;background:radial-gradient(1300px 580px at 85% 0%,rgba(0,255,170,.22),transparent 62%),radial-gradient(1100px 520px at 12% 100%,rgba(0,120,70,.26),transparent 68%),#030b08}
.login-card{width:min(960px,96vw);display:grid;grid-template-columns:1.02fr 1fr;background:rgba(0,0,0,.72);border:1px solid rgba(0,255,170,.2);border-radius:24px;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.45)}
.left-pane{padding:34px;position:relative;background:linear-gradient(145deg,rgba(0,0,0,.45),rgba(0,255,170,.1));border-right:1px solid rgba(255,255,255,.08)}
.right-pane{padding:34px}
.brand-kicker{font-size:.76rem;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.65)}
.brand-title{font-size:2.4rem;line-height:1;font-weight:800;letter-spacing:.02em;margin:14px 0 10px}
.brand-copy{color:rgba(255,255,255,.75);line-height:1.7;max-width:32ch}
.tabs{display:flex;gap:8px;background:rgba(255,255,255,.06);padding:5px;border-radius:999px}
.tab{flex:1;border:none;border-radius:999px;padding:10px 14px;background:transparent;color:#d8e1dd;font-weight:700;letter-spacing:.03em;cursor:pointer}
.tab.active{background:#00ffaa;color:#03120d}
.form{display:none;margin-top:18px}
.form.active{display:block}
.field{display:flex;flex-direction:column;gap:7px;margin-bottom:13px}
.field label{font-size:.8rem;color:rgba(255,255,255,.8)}
.field input{width:100%;border:1px solid rgba(255,255,255,.14);border-radius:12px;background:rgba(255,255,255,.06);padding:11px 12px;color:#fff;outline:none}
.field input:focus{border-color:rgba(0,255,170,.9);box-shadow:0 0 0 3px rgba(0,255,170,.18)}
.submit{width:100%;margin-top:8px;border:none;border-radius:12px;padding:12px 14px;font-weight:800;letter-spacing:.02em;background:#00ffaa;color:#03120d;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease}
.submit:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(0,255,170,.28)}
.submit:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
.status{margin-top:12px;font-size:.85rem;display:none;padding:10px 12px;border-radius:10px}
.status.error{display:block;background:rgba(255,70,70,.12);border:1px solid rgba(255,70,70,.45);color:#ffafaf}
.status.ok{display:block;background:rgba(0,255,170,.12);border:1px solid rgba(0,255,170,.45);color:#bcffe8}
.quick{margin-top:18px;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.04)}
.quick p{font-size:.87rem;color:rgba(255,255,255,.9)}
.quick .actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.quick a,.quick button{border-radius:999px;padding:8px 12px;font-size:.8rem;font-weight:700;border:1px solid rgba(0,255,170,.4);background:rgba(0,255,170,.12);color:#cffff0;text-decoration:none;cursor:pointer}
.muted-link{display:inline-flex;align-items:center;gap:6px;margin-top:14px;font-size:.85rem;color:#8eead1;text-decoration:none}
@media (max-width:900px){.login-card{grid-template-columns:1fr}.left-pane{border-right:none;border-bottom:1px solid rgba(255,255,255,.08)}}
</style>
<script>
(function(){
  const explicit=(window.SUNSESH_API||'').trim();
 const currentPort = String(location.port || '');
 const hasLikelyDevPort = !!currentPort && !['80', '443', '4000'].includes(currentPort);
 const isLanIp = /^\d{1,3}(?:\.\d{1,3}){3}$/.test(location.hostname);
 const preferLocalApi = isLanIp || location.hostname === 'localhost' || location.hostname === '127.0.0.1' || hasLikelyDevPort;
  const origin=(location.origin&&location.origin!=='null')?location.origin:'';
 const base = explicit || (preferLocalApi ? (location.protocol + '//' + location.hostname + ':4000') : origin);
  window.__SUNSESH_API_BASE=String(base||'').replace(/\/$/, '');
})();
</script>
</head>
<body>
  <main class="login-wrap">
    <section class="login-card">
      <aside class="left-pane">
        <h1 class="brand-title">THE SUN SESSION</h1>
        <p class="brand-kicker">UNDERGROUND ACCESS</p>
        <p class="brand-copy">Inicia sesión para gestionar tus compras, desbloquear contenido exclusivo y mantenerte dentro del circuito oficial.</p>
        <a class="muted-link" href="sunsessionesp_fixed_v3.html"><i class="ri-arrow-left-line"></i> Volver al inicio</a>
      </aside>
      <div class="right-pane">
        <div class="tabs" role="tablist">
          <button type="button" class="tab active" id="tabLogin">Iniciar sesión</button>
          <button type="button" class="tab" id="tabRegister">Crear cuenta</button>
        </div>

        <form id="loginForm" class="form active" autocomplete="off">
          <div class="field">
            <label for="identifier">Correo o usuario</label>
            <input id="identifier" name="identifier" autocomplete="off" required>
          </div>
          <div class="field">
            <label for="password">Contraseña</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required>
          </div>
          <button class="submit" id="loginBtn" type="submit">Entrar</button>
        </form>

        <form id="registerForm" class="form" autocomplete="on">
          <div class="field">
            <label for="regName">Nombre</label>
            <input id="regName" name="name" minlength="2" required>
          </div>
          <div class="field">
            <label for="regEmail">Correo</label>
            <input id="regEmail" name="email" type="email" required>
          </div>
          <div class="field">
            <label for="regPhone">Teléfono (opcional)</label>
            <input id="regPhone" name="phone" inputmode="tel">
          </div>
          <div class="field">
            <label for="regPassword">Contraseña</label>
            <input id="regPassword" name="password" type="password" minlength="6" required>
          </div>
          <button class="submit" id="registerBtn" type="submit">Crear cuenta</button>
        </form>

        <div id="status" class="status" role="status" aria-live="polite"></div>
        <div id="sessionQuick" class="quick" style="display:none"></div>
      </div>
    </section>
  </main>

<script>
const ROLE_KEY='ssc_admin_role';
const USER_KEY='ssc_admin_user';
const SESSION_KEY='ssc_user_session';

const tabLogin=document.getElementById('tabLogin');
const tabRegister=document.getElementById('tabRegister');
const loginForm=document.getElementById('loginForm');
const registerForm=document.getElementById('registerForm');
const statusBox=document.getElementById('status');
const quickBox=document.getElementById('sessionQuick');

function setStatus(message,type){
  statusBox.className='status';
  if(!message){statusBox.style.display='none';statusBox.textContent='';return;}
  statusBox.textContent=message;
  statusBox.classList.add(type==='error'?'error':'ok');
}

function setTab(mode){
  const loginActive=mode==='login';
  tabLogin.classList.toggle('active',loginActive);
  tabRegister.classList.toggle('active',!loginActive);
  loginForm.classList.toggle('active',loginActive);
  registerForm.classList.toggle('active',!loginActive);
  setStatus('','ok');
}

tabLogin.addEventListener('click',()=>setTab('login'));
tabRegister.addEventListener('click',()=>setTab('register'));

function persistSession(user){
  const role=String(user&&user.role||'').toUpperCase();
  try{
    localStorage.setItem(SESSION_KEY,JSON.stringify(user||{}));
    if(role==='ADMIN'){
      localStorage.setItem(ROLE_KEY,'admin');
      localStorage.setItem(USER_KEY,String(user.email||user.name||''));
    }else{
      localStorage.removeItem(ROLE_KEY);
      localStorage.removeItem(USER_KEY);
    }
  }catch{}
}

function renderQuick(user){
  if(!user){quickBox.style.display='none';quickBox.innerHTML='';return;}
  const role=String(user.role||'').toUpperCase();
  const safeName=(user.name||user.email||'Usuario').replace(/[<>]/g,'');
  quickBox.innerHTML=`
    <p>Sesión activa como <strong>${safeName}</strong> (${role||'USER'}).</p>
    <div class="actions">
      <a href="sunsessionesp_fixed_v3.html">Ir al inicio</a>
      ${role==='ADMIN'?'<a href="admin.html">Abrir panel admin</a>':''}
      <button type="button" id="logoutNow">Cerrar sesión</button>
    </div>
  `;
  quickBox.style.display='block';
  const logoutBtn=document.getElementById('logoutNow');
  if(logoutBtn){
    logoutBtn.addEventListener('click',async()=>{
      try{await fetch(window.__SUNSESH_API_BASE+'/api/auth/logout',{method:'POST',credentials:'include'});}catch{}
      try{localStorage.removeItem(SESSION_KEY);localStorage.removeItem(ROLE_KEY);localStorage.removeItem(USER_KEY);}catch{}
      quickBox.style.display='none';
      setStatus('Sesión cerrada.','ok');
      setTab('login');
    });
  }
}

async function fetchMe(){
  try{
    const res=await fetch(window.__SUNSESH_API_BASE+'/api/auth/me',{credentials:'include',headers:{'Cache-Control':'no-cache'},cache:'no-store'});
    if(!res.ok) return null;
    const data=await res.json();
    return data&&data.user?data.user:null;
  }catch{return null}
}

loginForm.addEventListener('submit',async(ev)=>{
  ev.preventDefault();
  setStatus('','ok');
  const btn=document.getElementById('loginBtn');
  const identifier=(document.getElementById('identifier').value||'').trim();
  const password=document.getElementById('password').value||'';
  if(!identifier||!password){setStatus('Completa tus credenciales.','error');return;}
  btn.disabled=true;
  try{
    const res=await fetch(window.__SUNSESH_API_BASE+'/api/auth/login',{
      method:'POST',
      credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({identifier,password})
    });
    if(!res.ok){
      const msg=await res.text().catch(()=> 'No se pudo iniciar sesión.');
      setStatus(msg||'No se pudo iniciar sesión.','error');
      return;
    }
    const data=await res.json();
    const user=data&&data.user?data.user:null;
    if(!user){setStatus('No se pudo validar la sesión.','error');return;}
    persistSession(user);
    setStatus('Acceso correcto. Redirigiendo...','ok');
    const role=String(user.role||'').toUpperCase();
    setTimeout(()=>{window.location.href=(role==='ADMIN'?'admin.html':'sunsessionesp_fixed_v3.html');},500);
  }catch{
    setStatus('Error de conexión con el servidor.','error');
  }finally{btn.disabled=false;}
});

registerForm.addEventListener('submit',async(ev)=>{
  ev.preventDefault();
  setStatus('','ok');
  const btn=document.getElementById('registerBtn');
  const name=(document.getElementById('regName').value||'').trim();
  const email=(document.getElementById('regEmail').value||'').trim();
  const phone=(document.getElementById('regPhone').value||'').trim();
  const password=(document.getElementById('regPassword').value||'');
  if(name.length<2||!email||password.length<6){setStatus('Verifica nombre, correo y contraseña (mínimo 6).','error');return;}
  btn.disabled=true;
  try{
    const res=await fetch(window.__SUNSESH_API_BASE+'/api/auth/register',{
      method:'POST',
      credentials:'include',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,email,password,phone,role:'USER'})
    });
    if(!res.ok){
      const msg=await res.text().catch(()=> 'No se pudo crear la cuenta.');
      setStatus(msg||'No se pudo crear la cuenta.','error');
      return;
    }
    const data=await res.json();
    const user=data&&data.user?data.user:null;
    if(user) persistSession(user);
    setStatus('Cuenta creada correctamente. Ya puedes continuar.','ok');
    setTimeout(()=>{window.location.href='sunsessionesp_fixed_v3.html';},700);
  }catch{
    setStatus('Error de conexión con el servidor.','error');
  }finally{btn.disabled=false;}
});

(async function init(){
  const user=await fetchMe();
  if(user){
    persistSession(user);
    renderQuick(user);
    setStatus('Ya tienes una sesión activa.','ok');
    return;
  }
  try{localStorage.removeItem(SESSION_KEY);localStorage.removeItem(ROLE_KEY);localStorage.removeItem(USER_KEY);}catch{}
  const identifierInput=document.getElementById('identifier');
  const passwordInput=document.getElementById('password');
  if(identifierInput) identifierInput.value='';
  if(passwordInput) passwordInput.value='';
  setTimeout(()=>{
    if(identifierInput) identifierInput.value='';
    if(passwordInput) passwordInput.value='';
  },60);
})();
</script>
</body>
</html>
